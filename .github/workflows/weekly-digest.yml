name: Weekly recognition digest

on:
  # Mondays at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-digest:
    name: Send weekly digest emails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Invoke weekly-digest Edge Function
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.DIGEST_FUNCTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DIGEST_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json")

          echo "Response body:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Digest function returned HTTP $HTTP_STATUS"
            exit 1
          fi

          EMAILS_SENT=$(cat /tmp/response.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('emails_sent', 0))")
          echo "Emails sent: $EMAILS_SENT"
